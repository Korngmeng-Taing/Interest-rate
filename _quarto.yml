      - text: "Resources"
        menu:
          - text: "About Us"
            href: about-us.qmd
          - text: "Deliverables"
            href: deliverables.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    code-fold: true
    code-summary: "Show code"
    code-overflow: wrap
    code-tools: true
    df-print: paged
    toc: true
    toc-depth: 3
    smooth-scroll: true
    highlight-style: a11y-dark
    number-sections: false
    reference-location: margin
    citations-hover: true
    footnotes-hover: true

execute:
  enabled: true
  freeze: false
  error: false
  eval: true
  warning: false
