project:
  type: website
  output-dir: _output

website:
  title: "Interest Rate Risk and Bond Pricing"
  navbar:
    title: "Interest Rate Risk and Bond Pricing"
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Foundations"
        menu:
          - text: "Introduction"
            href: introduction.qmd
          - text: "Objectives"
            href: objectives.qmd
      - text: "Theoretical Framework"
        menu:
          - text: "Dothan Model"
            href: dothan-model.qmd
          - text: "Bond Pricing"
            href: bond-pricing.qmd
      - text: "Implementation"
        menu:
          - text: "Simulation"
            href: simulation.qmd
          - text: "Bond Pricing Estimation"
            href: bond-pricing-estimation.qmd
      - text: "Risk Analysis"
        menu:
          - text: "Risk Analysis"
